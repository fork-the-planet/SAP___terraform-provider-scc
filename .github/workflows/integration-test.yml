name: Integration Test - Terraform Provider

# Idea:
# 1. Build the provider from the latest pull
# 2. Setup Terraform
# 3. Execute the integration test script
# 4. All changes must apply
# 5. Destroy the infrastructure

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1,3"

env:
  PATH_TO_TFSCRIPT: "integration"
  DEV_OVERRIDE: "config/provider-config-ghaction.txt"
  TEMP_PLAN_OUTPUT: "plan-output.tfplan"

permissions:
  contents: read
  issues: write

jobs:
  test:
    name: Integration Test for Terraform Provider
    runs-on: ubuntu-latest

    environment:
      name: scc

    env:
      SCC_USERNAME: ${{ secrets.SCC_USERNAME }}
      SCC_PASSWORD: ${{ secrets.SCC_PASSWORD }}
      SCC_INSTANCE_URL: ${{ secrets.SCC_INSTANCE_URL }}
      TF_VAR_subaccount: ${{ secrets.INTEGRATION_SUBACCOUNT_ID }}
      TF_VAR_cloud_user: ${{ secrets.CLOUD_USER }}
      TF_VAR_cloud_password: ${{ secrets.CLOUD_PASSWORD }}

    steps:
      - name: Check out Git repository
        id: checkout_repo
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Setup Terraform
        id: setup_terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_wrapper: false
          terraform_version: latest

      - name: Install local Terraform provider
        id: build_provider
        shell: bash
        run: |
          go mod tidy && make install

      - name: Remove init data and place override
        id: set_to_override
        shell: bash
        run: |
          rm -rf ${{ env.PATH_TO_TFSCRIPT }}/.terraform
          rm -rf ${{ env.PATH_TO_TFSCRIPT }}/.terraform.lock.hcl
          cp ${{ env.DEV_OVERRIDE }} ~/.terraformrc

      - name: Terraform Plan with local provider
        id: terraform_plan_local
        shell: bash
        run: |
          set +e

          terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} plan \
            -no-color \
            -detailed-exitcode

          EXIT_CODE=$?
          echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 1 ]; then
            echo "Error during terraform plan execution"
            exit 1
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "Changes detected in terraform plan"
          else
            echo "No changes detected in terraform plan"
          fi

      - name: Terraform Apply with local provider
        if: steps.terraform_plan_local.outputs.exitcode == '0' || steps.terraform_plan_local.outputs.exitcode == '2'
        id: terraform_apply_local
        shell: bash
        run: |
          set +e

          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "attempts=0" >> $GITHUB_OUTPUT

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Terraform apply attempt $i..."

            terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} apply \
              -auto-approve \
              -no-color \

            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "Terraform apply succeeded"
              echo "attempts=$i" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Terraform apply failed with exit code $EXIT_CODE"

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done

          echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "Terraform apply failed after retries"
          exit 1

      - name: Terraform Destroy with local provider
        if: always()
        id: terraform_destroy_local
        shell: bash
        run: |
          set +e

          MAX_RETRIES=3
          RETRY_DELAY=10

          echo "attempts=0" >> $GITHUB_OUTPUT

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Terraform destroy attempt $i..."

            terraform -chdir=${{ env.PATH_TO_TFSCRIPT }} destroy \
              -auto-approve \
              -no-color

            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "Terraform destroy succeeded"
              echo "attempts=$i" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Terraform destroy failed with exit code $EXIT_CODE"

            if [ $i -lt $MAX_RETRIES ]; then
              echo "Retrying in $RETRY_DELAY seconds..."
              sleep $RETRY_DELAY
            fi
          done

          echo "attempts=$MAX_RETRIES" >> $GITHUB_OUTPUT
          echo "Terraform destroy failed after retries"
          exit 1

  report-failure:
    name: Report any failure in workflow
    needs: [test]
    if: always()
    uses: ./.github/workflows/create-issue-on-failure.yml
    with:
      workflow_name: "Terraform Integration Tests"
      job_results: |
        test: ${{ needs.test.result }}
      labels: '["integration-test","terraform","failure"]'
      test_type: "integration"
